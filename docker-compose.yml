version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: repolens-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: repolens
    ports:
      - "5432:5432"
    volumes:
      - repolens-db-data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: repolens-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  repolens-db-data:
